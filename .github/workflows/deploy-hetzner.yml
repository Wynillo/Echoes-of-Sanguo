name: Deploy to Hetzner

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci
          git clone https://github.com/Wynillo/Echoes-of-Sanguo-TCG.git /tmp/tcg-format
          cd /tmp/tcg-format && npm ci && npm run build && npm link
          cd ${{ github.workspace }} && npm link @wynillo/tcg-format
          npm run build

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/sanguo"
          strip_components: 1
          rm: true

      - name: Notify
        run: echo "Deployed ${{ github.ref_name }} to nightbeak.dev"
