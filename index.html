<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Echoes of Sanguo</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/progression.css">
</head>
<body>
<div id="react-root">
  <style>
    .loading-screen {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 24px;
      background: radial-gradient(ellipse at center, #101828 0%, #060a14 70%);
      z-index: 100;
    }
    .loading-screen p {
      font-family: monospace;
      font-size: 0.65rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #8899aa;
      text-shadow: 0 0 8px rgba(100, 140, 180, 0.4);
      animation: loading-pulse 2s ease-in-out infinite;
    }
    .loading-bar-track {
      width: 200px; height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .loading-bar-fill {
      height: 100%; width: 0%;
      background: #667888;
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    @keyframes loading-pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
  <div class="loading-screen">
    <p>LOADING…</p>
    <div class="loading-bar-track">
      <div class="loading-bar-fill" id="loading-bar"></div>
    </div>
  </div>
</div>
<div id="crt-overlay"></div>
<script type="module" src="/js/main.ts"></script>
</body>
</html>
