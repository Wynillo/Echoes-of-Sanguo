<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests; block-all-mixed-content;">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#060e0a">
  <meta name="description" content="Echoes of Sanguo — A browser-based TCG inspired by classic card battlers, set in the Three Kingdoms era.">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon-180x180.png">
  <title>Echoes of Sanguo</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/progression.css">
</head>
<body>
<a class="skip-link" href="#react-root">Skip to game</a>
<div id="react-root">
  <style>
    .loading-screen {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 24px;
      background: radial-gradient(ellipse at center, #101828 0%, #060a14 70%);
      z-index: 100;
    }
    .loading-screen p {
      font-family: monospace;
      font-size: 0.65rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #8899aa;
      text-shadow: 0 0 8px rgba(100, 140, 180, 0.4);
      animation: loading-pulse 2s ease-in-out infinite;
    }
    .loading-bar-track {
      width: 200px; height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .loading-bar-fill {
      height: 100%; width: 0%;
      background: #667888;
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    @keyframes loading-pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
  <div class="loading-screen">
    <p>LOADING…</p>
    <div class="loading-bar-track">
      <div class="loading-bar-fill" id="loading-bar"></div>
    </div>
  </div>
</div>
<div id="crt-overlay"></div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
